name: ⚙️ Integration Test Bundle (cpp)

on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
      - 'main'
  workflow_dispatch:

jobs:
  integration-test:
    name: Run Bundle Integration Test
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'cpp' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Install QLT
      id: install-qlt-local
      uses: ./.github/actions/install-qlt-local

    - name: Validate QLT Installation
      shell: bash
      run: |
        echo -e "Checking QLT Version:"
        echo "QLT Home: ${{ steps.install-qlt-local.outputs.qlt-home }}"
        qlt version

    - name: Install CodeQL CLI
      shell: bash
      run: |
        qlt codeql install --base example

    - name: Create Bundle (compiled)
      shell: bash
      run: |
        qlt phase package --base example

    - name: Validate Bundle Existence
      id: bundle
      shell: bash
      run: |
        echo "Checking Bundle Existence"
        ls -l example/target/custom-bundle/*/codeql-bundle*.tar.gz
        BUNDLE_PATH=$(ls example/target/custom-bundle/*/codeql-bundle*.tar.gz | head -n1)
        echo "bundle-path=$BUNDLE_PATH" >> "$GITHUB_OUTPUT"

    - name: Upload Bundles
      uses: actions/upload-artifact@v7
      with:
        name: codeql-bundles
        path: example/target/custom-bundle/**/codeql-bundle*.tar.gz
        if-no-files-found: error
        compression-level: 0

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        tools: ${{ steps.bundle.outputs.bundle-path }}
        config: |
          disable-default-queries: true
          packs:
            - qlt55/stuff

    - name: Autobuild
      uses: github/codeql-action/autobuild@v4
      with:
        working-directory: example/integration-tests/${{ matrix.language }}/src/

    - name: Perform CodeQL Analysis
      id: analysis
      uses: github/codeql-action/analyze@v4

    - name: Validate SARIF Location
      shell: bash
      run: |
        echo "Checking SARIF file location at: ${{ steps.analysis.outputs.sarif-output }}"
        ls -l ${{ steps.analysis.outputs.sarif-output }}

    - name: Upload SARIF Results
      uses: actions/upload-artifact@v7
      with:
        name: actual.sarif
        path: |
          ${{ steps.analysis.outputs.sarif-output }}/*.sarif
        if-no-files-found: error

    - name: Validate SARIF Existence
      shell: bash
      run: |
        ls -l ${{ steps.analysis.outputs.sarif-output }}/*.sarif
    - name: Validate SARIF Results
      shell: bash
      run: |
        qlt bundle validate-integration-tests --base example --expected example/integration-tests/${{ matrix.language }}/expected.sarif --actual ${{ steps.analysis.outputs.sarif-output }}/${{ matrix.language }}.sarif
