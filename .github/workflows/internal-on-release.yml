name: 🚀 Build and Publish Release

on:
  release:
    types: [published]

jobs:
  extract-version:
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: version
        run: |
          # Strip leading 'v' from the tag name (e.g. v1.2.3 -> 1.2.3)
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    outputs:
      version: ${{ steps.version.outputs.version }}

  build-linux64:
    uses: ./.github/workflows/internal-build-release-linux64.yml
    needs: extract-version
    with:
      version: ${{ needs.extract-version.outputs.version }}

  build-macos-arm64:
    uses: ./.github/workflows/internal-build-release-macos-arm64.yml
    needs: extract-version
    with:
      version: ${{ needs.extract-version.outputs.version }}

  build-macos-x64:
    uses: ./.github/workflows/internal-build-release-macos-x64.yml
    needs: extract-version
    with:
      version: ${{ needs.extract-version.outputs.version }}

  build-win64:
    uses: ./.github/workflows/internal-build-release-win64.yml
    needs: extract-version
    with:
      version: ${{ needs.extract-version.outputs.version }}
